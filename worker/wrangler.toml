name = "line-sticker-gemini"
main = "src/index.js"
compatibility_date = "2025-01-01"

# Required secrets (set each via `npx wrangler secret put <NAME>`):
#   VERTEX_API_KEY      — Google Cloud Vertex AI key
#   TURNSTILE_SECRET    — Cloudflare Turnstile secret key (pair with the
#                         TURNSTILE_SITE_KEY const in src/index.js).
#                         For local/dev: 1x0000000000000000000000000000000AA
#                         (Cloudflare's always-passing test secret).
#   ADMIN_TOKEN         — random string used as Bearer for
#                         POST /admin/reset-quota.
#
# Optional vars (non-secret):
#   DEFAULT_MODEL = "gemini-3.1-flash-image-preview"

# Daily AI-quota tracking. Create the namespace once:
#   npx wrangler kv namespace create QUOTA
# It prints something like:
#   { binding = "QUOTA", id = "abc123def456..." }
# Paste the `id` value below.
[[kv_namespaces]]
binding = "QUOTA"
id = "3cb1b10b42084aca91151c7884970708"
