name = "line-sticker-gemini"
main = "src/index.js"
compatibility_date = "2025-01-01"

# VERTEX_API_KEY is set via:
#   npx wrangler secret put VERTEX_API_KEY
#
# Optional vars (non-secret):
#   DEFAULT_MODEL = "gemini-3.1-flash-image-preview"

# Daily AI-quota tracking. Create the namespace once:
#   npx wrangler kv namespace create QUOTA
# It prints something like:
#   { binding = "QUOTA", id = "abc123def456..." }
# Paste the `id` value below.
[[kv_namespaces]]
binding = "QUOTA"
id = "3cb1b10b42084aca91151c7884970708"
